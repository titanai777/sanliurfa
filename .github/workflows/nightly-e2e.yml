name: Nightly E2E

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sanliurfa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run full E2E
        id: e2e
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:e2e:full 2>&1 | tee nightly-e2e.log
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          PUBLIC_SITE_URL: http://127.0.0.1:1111
          PORT: "1111"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-report
          path: |
            playwright-report
            test-results
            nightly-e2e.log
          if-no-files-found: ignore

      - name: Open or update nightly issue
        if: always()
        uses: actions/github-script@v7
        env:
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            const title = 'Nightly E2E Report';
            const e2eLog = fs.existsSync('nightly-e2e.log')
              ? fs.readFileSync('nightly-e2e.log', 'utf8')
              : '';
            const failCandidates = e2eLog
              .split('\n')
              .map((line) => line.trim())
              .filter((line) =>
                line.startsWith('FAIL') ||
                line.startsWith('×') ||
                line.startsWith('Error:') ||
                line.includes('failed')
              )
              .slice(0, 8);
            const failingSummary = failCandidates.length > 0
              ? ['## Top Failing Tests', ...failCandidates.map((line) => `- ${line}`)].join('\n')
              : '## Top Failing Tests\n- No failing tests captured from log';
            let releaseGateSummary = '## Latest Release Gate Summary\n- No recent release gate artifact found';
            try {
              const { data: workflowRuns } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                status: 'completed',
                per_page: 20
              });
              const latestSuccessfulFullGate = (workflowRuns.workflow_runs || []).find((run) => {
                const branch = String(run.head_branch || '');
                const conclusion = String(run.conclusion || '').toLowerCase();
                return conclusion === 'success' && (branch === 'main' || branch === 'master');
              });
              if (latestSuccessfulFullGate) {
                const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: latestSuccessfulFullGate.id
                });
                const releaseGateArtifact = (artifacts.artifacts || []).find(
                  (artifact) => artifact.name === 'release-gate-summary'
                );
                releaseGateSummary = [
                  '## Latest Release Gate Summary',
                  `- Run: ${latestSuccessfulFullGate.html_url}`,
                  `- Branch: ${latestSuccessfulFullGate.head_branch}`,
                  `- Artifact: ${releaseGateArtifact ? `${releaseGateArtifact.name} (${releaseGateArtifact.updated_at || 'updated_at yok'})` : 'release-gate-summary bulunamadı'}`
                ].join('\n');
              }
            } catch (error) {
              releaseGateSummary = `## Latest Release Gate Summary\n- Artifact metadata unavailable: ${error?.message || 'unknown error'}`;
            }
            const body = [
              '## Nightly E2E',
              `- Outcome: ${process.env.E2E_OUTCOME}`,
              `- Run: ${process.env.RUN_URL}`,
              '',
              failingSummary,
              '',
              releaseGateSummary
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const existing = issues.find((issue) => issue.title === title);
            let trendSummary = '## Trend\n- Not enough history yet';
            try {
              const workflowFile = 'nightly-e2e.yml';
              const branch = context.ref?.startsWith('refs/heads/')
                ? context.ref.replace('refs/heads/', '')
                : undefined;
              const { data: workflowRuns } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                per_page: 20,
                ...(branch ? { branch } : {})
              });
              const recentOutcomes = (workflowRuns.workflow_runs || [])
                .filter((run) => run.status === 'completed' && run.conclusion)
                .map((run) => String(run.conclusion).toLowerCase())
                .slice(0, 7);
              if (recentOutcomes.length > 0) {
                const successCount = recentOutcomes.filter((outcome) => outcome === 'success').length;
                trendSummary = [
                  '## Trend',
                  `- Last ${recentOutcomes.length} completed run success rate: ${Math.round((successCount / recentOutcomes.length) * 100)}%`,
                  `- Outcomes: ${recentOutcomes.join(', ')}`
                ].join('\n');
              }
            } catch (error) {
              trendSummary = `## Trend\n- Workflow trend unavailable: ${error?.message || 'unknown error'}`;
            }
            const finalBody = [body, '', trendSummary].join('\n');
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: finalBody
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: finalBody
              });
            }
