name: Nightly E2E

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sanliurfa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run full E2E
        id: e2e
        continue-on-error: true
        run: npm run test:e2e:full
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          PUBLIC_SITE_URL: http://127.0.0.1:1111
          PORT: "1111"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Open or update nightly issue
        if: always()
        uses: actions/github-script@v7
        env:
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = 'Nightly E2E Report';
            const body = [
              '## Nightly E2E',
              `- Outcome: ${process.env.E2E_OUTCOME}`,
              `- Run: ${process.env.RUN_URL}`,
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

