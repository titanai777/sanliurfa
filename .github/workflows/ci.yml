name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sanliurfa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Repo stabilization check
        run: npm run repo:stabilize:check

      - name: Governance import guard
        run: npm run governance:imports:check

      - name: DB drift check
        run: npm run db:drift:check
      
      - name: Lint code
        run: npm run lint
      
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
      
      - name: Run unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Release gate
        run: npm run release:gate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Run E2E smoke
        run: npm run test:e2e:smoke
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Run full E2E advisory
        continue-on-error: true
        run: npm run test:e2e:full
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Add your deployment script here
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
