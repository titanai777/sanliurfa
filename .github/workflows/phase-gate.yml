name: Phase Gate

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  phase_doctor_advisory:
    name: phase:doctor:advisory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Install
        run: npm ci --legacy-peer-deps
      - name: Phase Doctor
        run: npm run phase:doctor

  phase_check_tsconfig:
    name: phase:check:tsconfig
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Install
        run: npm ci --legacy-peer-deps
      - name: Phase Tsconfig Check
        run: npm run phase:check:tsconfig

  phase_gate_ci:
    name: test:phase:gate:ci
    runs-on: ubuntu-latest
    needs:
      - phase_doctor_advisory
      - phase_check_tsconfig
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Install
        run: npm ci --legacy-peer-deps
      - name: Ensure Rollup Linux Binary
        run: npm i -D @rollup/rollup-linux-x64-gnu --no-save --legacy-peer-deps
      - name: Run Phase Gate
        run: npm run env:contract:check:ci && npm run security:secrets:scan && npm run typecheck:app && npm run phase:check:tsconfig && npm run lint:phase && npm run test:phase:latest && npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          READ_REPLICA_URL: ""
          PUBLIC_SITE_URL: http://127.0.0.1:1111
          PORT: "1111"
