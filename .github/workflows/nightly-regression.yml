name: Nightly Regression

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  nightly-unit-regression:
    runs-on: ubuntu-latest
    continue-on-error: true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sanliurfa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
      READ_REPLICA_URL: ""
      PUBLIC_SITE_URL: http://127.0.0.1:1111
      PORT: "1111"

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run nightly unit regression
        id: nightly_regression
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:regression:unit 2>&1 | tee nightly-regression.log
      - name: Upload unit regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-unit-regression
          path: |
            coverage
            docs/reports
            nightly-regression.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload performance ops summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-performance-ops-summary
          path: docs/reports/performance-ops-summary.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Generate migration summary
        if: always()
        continue-on-error: true
        run: |
          node <<'NODE' > migration-summary.md
          const fs = require('node:fs');
          const path = require('node:path');

          const migrationsDir = path.join(process.cwd(), 'src', 'migrations');
          const trackerPath = path.join(migrationsDir, 'migration-tracker.json');

          const versioned = fs.existsSync(migrationsDir)
            ? fs.readdirSync(migrationsDir).filter((name) => /^\d{3}_.+\.ts$/.test(name)).sort()
            : [];
          const latest = versioned.length > 0 ? versioned[versioned.length - 1] : 'none';
          const trackerExists = fs.existsSync(trackerPath);
          const trackerEntries = trackerExists
            ? (JSON.parse(fs.readFileSync(trackerPath, 'utf8')).migrations || [])
            : [];
          const pending = trackerEntries.filter((entry) => entry && entry.status === 'pending');
          const missing = trackerEntries.filter((entry) => {
            if (!entry || !entry.file) return false;
            return !fs.existsSync(path.join(migrationsDir, entry.file));
          });

          const lines = [
            '## Migration Summary',
            `- Generated at: ${new Date().toISOString()}`,
            `- Versioned migration files: ${versioned.length}`,
            `- Latest versioned migration: ${latest}`,
            `- Tracker file present: ${trackerExists ? 'yes' : 'no'}`,
            `- Tracker entries: ${trackerEntries.length}`,
            `- Tracker entries pending: ${pending.length}`,
            `- Tracker entries with missing files: ${missing.length}`
          ];

          if (missing.length > 0) {
            lines.push(`- Missing tracker files sample: ${missing.slice(0, 10).map((entry) => entry.file).join(', ')}`);
          }

          process.stdout.write(`${lines.join('\n')}\n`);
          NODE
          cat migration-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Write performance ops summary
        if: always()
        continue-on-error: true
        run: npm exec -- tsx scripts/write-performance-ops-summary.ts
      - name: Apply ops retention
        if: always()
        continue-on-error: true
        run: npm run ops:retention:apply

      - name: Write nightly regression summary
        if: always()
        uses: actions/github-script@v7
        env:
          REGRESSION_OUTCOME: ${{ steps.nightly_regression.outcome }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const regressionLog = fs.existsSync('nightly-regression.log')
              ? fs.readFileSync('nightly-regression.log', 'utf8')
              : '';
            const topFailures = regressionLog
              .split('\n')
              .map((line) => line.trim())
              .filter((line) => line.startsWith('FAIL') || line.startsWith('×') || line.startsWith('❯'))
              .slice(0, 8);
            let recentOutcomes = [];
            let successRatePercent = null;
            try {
              const { data: workflowRuns } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'nightly-regression.yml',
                per_page: 20
              });
              recentOutcomes = (workflowRuns.workflow_runs || [])
                .filter((run) => run.status === 'completed' && run.conclusion)
                .map((run) => String(run.conclusion).toLowerCase())
                .slice(0, 7);
              if (recentOutcomes.length > 0) {
                const successCount = recentOutcomes.filter((outcome) => outcome === 'success').length;
                successRatePercent = Math.round((successCount / recentOutcomes.length) * 100);
              }
            } catch {}

            const summary = {
              available: true,
              kind: 'regression',
              generatedAt: new Date().toISOString(),
              outcome: process.env.REGRESSION_OUTCOME || 'missing',
              successRatePercent,
              recentOutcomes,
              topFailures,
              performanceOptimization: fs.existsSync(path.join(process.cwd(), 'docs', 'reports', 'performance-ops-summary.json'))
                ? JSON.parse(fs.readFileSync(path.join(process.cwd(), 'docs', 'reports', 'performance-ops-summary.json'), 'utf8'))
                : null
            };
            fs.mkdirSync(path.join(process.cwd(), 'docs', 'reports'), { recursive: true });
            fs.writeFileSync(
              path.join(process.cwd(), 'docs', 'reports', 'nightly-regression-summary.json'),
              `${JSON.stringify(summary, null, 2)}\n`,
              'utf8'
            );

      - name: Resolve latest successful full gate run
        if: always()
        id: release_gate_run
        uses: actions/github-script@v7
        with:
          script: |
            const { data: workflowRuns } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              status: 'completed',
              per_page: 20
            });
            const latestSuccessfulFullGate = (workflowRuns.workflow_runs || []).find((run) => {
              const branch = String(run.head_branch || '');
              const conclusion = String(run.conclusion || '').toLowerCase();
              return conclusion === 'success' && (branch === 'main' || branch === 'master');
            });
            core.setOutput('run_id', latestSuccessfulFullGate ? String(latestSuccessfulFullGate.id) : '');
            core.setOutput('run_url', latestSuccessfulFullGate ? String(latestSuccessfulFullGate.html_url) : '');
            core.setOutput('run_branch', latestSuccessfulFullGate ? String(latestSuccessfulFullGate.head_branch) : '');

      - name: Download latest release gate summary artifact
        if: always() && steps.release_gate_run.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.release_gate_run.outputs.run_id }}
          name: release-gate-summary
          path: latest-release-gate

      - name: Open or update nightly regression issue
        if: always()
        uses: actions/github-script@v7
        env:
          REGRESSION_OUTCOME: ${{ steps.nightly_regression.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_GATE_RUN_URL: ${{ steps.release_gate_run.outputs.run_url }}
          RELEASE_GATE_RUN_BRANCH: ${{ steps.release_gate_run.outputs.run_branch }}
        with:
          script: |
            const fs = require('fs');
            const HOURS = {
              releaseGate: 24,
              nightlyRegression: 36,
              nightlyE2E: 36,
              performanceOps: 24
            };
            function classifyArtifact(kind, available, generatedAt) {
              if (!available || !generatedAt) {
                return 'blocked';
              }
              const ageHours = (Date.now() - new Date(generatedAt).getTime()) / (1000 * 60 * 60);
              return ageHours > HOURS[kind] ? 'degraded' : 'healthy';
            }
            function buildArtifactAlert(releaseGate, nightlySummary) {
              const entries = [
                {
                  label: 'releaseGate',
                  status: classifyArtifact('releaseGate', Boolean(releaseGate?.generatedAt), releaseGate?.generatedAt),
                  generatedAt: releaseGate?.generatedAt ?? null
                },
                {
                  label: 'nightlyRegression',
                  status: classifyArtifact('nightlyRegression', Boolean(nightlySummary?.generatedAt), nightlySummary?.generatedAt),
                  generatedAt: nightlySummary?.generatedAt ?? null
                },
                {
                  label: 'performanceOps',
                  status: classifyArtifact(
                    'performanceOps',
                    Boolean(nightlySummary?.performanceOptimization?.generatedAt),
                    nightlySummary?.performanceOptimization?.generatedAt
                  ),
                  generatedAt: nightlySummary?.performanceOptimization?.generatedAt ?? null
                }
              ];
              const blockedCount = entries.filter((entry) => entry.status === 'blocked').length;
              const degradedCount = entries.filter((entry) => entry.status === 'degraded').length;
              const overall = blockedCount > 0 ? 'blocked' : degradedCount > 0 ? 'degraded' : 'healthy';
              const action = overall === 'blocked'
                ? 'Aynı gün müdahale et.'
                : overall === 'degraded'
                  ? 'Sonraki çalışma bloğunda düzelt.'
                  : 'Aksiyon yok.';
              return {
                overall,
                lines: [
                  '## Artifact Freshness Alert',
                  `- Overall: ${overall}`,
                  `- Aksiyon: ${action}`,
                  ...entries.map((entry) => `- ${entry.label}: ${entry.status} (${entry.generatedAt || 'missing'})`)
                ].join('\n')
              };
            }
            const title = 'Nightly Unit Regression Report';
            const migrationSummary = fs.existsSync('migration-summary.md')
              ? fs.readFileSync('migration-summary.md', 'utf8')
              : '## Migration Summary\n- Not available for this run';
            const regressionLog = fs.existsSync('nightly-regression.log')
              ? fs.readFileSync('nightly-regression.log', 'utf8')
              : '';
            const nightlySummary = fs.existsSync('docs/reports/nightly-regression-summary.json')
              ? JSON.parse(fs.readFileSync('docs/reports/nightly-regression-summary.json', 'utf8'))
              : null;
            const failCandidates = regressionLog
              .split('\n')
              .map((line) => line.trim())
              .filter((line) => line.startsWith('FAIL') || line.startsWith('×') || line.startsWith('❯'))
              .slice(0, 8);
            const failingSummary = failCandidates.length > 0
              ? ['## Top Failing Tests', ...failCandidates.map((line) => `- ${line}`)].join('\n')
              : '## Top Failing Tests\n- No failing tests captured from log';
            let releaseGateSummary = '## Latest Release Gate Summary\n- No recent release gate artifact found';
            let releaseGatePayload = null;
            try {
              const summaryPath = 'latest-release-gate/release-gate-summary.json';
              if (fs.existsSync(summaryPath)) {
                const releaseGate = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
                releaseGatePayload = releaseGate;
                const blocking = Array.isArray(releaseGate.blockingFailedSteps) && releaseGate.blockingFailedSteps.length > 0
                  ? releaseGate.blockingFailedSteps.map((step) => `- Blocking: ${step}`)
                  : ['- Blocking: yok'];
                const advisory = Array.isArray(releaseGate.advisoryFailedSteps) && releaseGate.advisoryFailedSteps.length > 0
                  ? releaseGate.advisoryFailedSteps.map((step) => `- Advisory: ${step}`)
                  : ['- Advisory: yok'];
                const stepPreview = Array.isArray(releaseGate.steps) && releaseGate.steps.length > 0
                  ? releaseGate.steps.slice(0, 5).map((step) => `- ${step.step}: ${step.status}${step.advisory ? ' (advisory)' : ''}`)
                  : ['- Step preview: yok'];
                releaseGateSummary = [
                  '## Latest Release Gate Summary',
                  `- Run: ${process.env.RELEASE_GATE_RUN_URL || 'bilinmiyor'}`,
                  `- Branch: ${process.env.RELEASE_GATE_RUN_BRANCH || 'bilinmiyor'}`,
                  `- Final status: ${releaseGate.finalStatus || 'missing'}`,
                  `- Generated at: ${releaseGate.generatedAt || 'bilinmiyor'}`,
                  `- Performance recommendations: ${releaseGate.performanceOptimization?.recommendations?.total ?? 'unknown'}`,
                  `- Slow request rate: ${releaseGate.performanceOptimization?.metrics?.slowRequestRate ?? 'unknown'}%`,
                  ...blocking,
                  ...advisory,
                  ...stepPreview
                ].join('\n');
              }
            } catch (error) {
              releaseGateSummary = `## Latest Release Gate Summary\n- Summary unavailable: ${error?.message || 'unknown error'}`;
            }
            const artifactAlert = buildArtifactAlert(releaseGatePayload, nightlySummary);
            if (artifactAlert.overall !== 'healthy') {
              core.warning(`Artifact freshness degraded for nightly regression: ${artifactAlert.overall}`);
            }

            const body = [
              '## Nightly Unit Regression',
              `- Outcome: ${process.env.REGRESSION_OUTCOME}`,
              `- Run: ${process.env.RUN_URL}`,
              '',
              failingSummary,
              '',
              artifactAlert.lines,
              '',
              releaseGateSummary,
              '',
              migrationSummary
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const existing = issues.find((issue) => issue.title === title);
            let trendSummary = '## Trend\n- Not enough history yet';
            try {
              const workflowFile = 'nightly-regression.yml';
              const branch = context.ref?.startsWith('refs/heads/')
                ? context.ref.replace('refs/heads/', '')
                : undefined;
              const { data: workflowRuns } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                per_page: 20,
                ...(branch ? { branch } : {})
              });
              const recentOutcomes = (workflowRuns.workflow_runs || [])
                .filter((run) => run.status === 'completed' && run.conclusion)
                .map((run) => String(run.conclusion).toLowerCase())
                .slice(0, 7);
              if (recentOutcomes.length > 0) {
                const successCount = recentOutcomes.filter((outcome) => outcome === 'success').length;
                trendSummary = [
                  '## Trend',
                  `- Last ${recentOutcomes.length} completed run success rate: ${Math.round((successCount / recentOutcomes.length) * 100)}%`,
                  `- Outcomes: ${recentOutcomes.join(', ')}`
                ].join('\n');
              }
            } catch (error) {
              trendSummary = `## Trend\n- Workflow trend unavailable: ${error?.message || 'unknown error'}`;
            }
            const finalBody = [body, '', trendSummary].join('\n');
            const nightlySummaryBlock = nightlySummary
              ? [
                  '## Nightly Summary',
                  `- Outcome: ${nightlySummary.outcome}`,
                  `- Success rate: ${nightlySummary.successRatePercent ?? 'unknown'}%`,
                  `- Recent outcomes: ${(nightlySummary.recentOutcomes || []).join(', ') || 'yok'}`,
                  `- Performance recommendations: ${nightlySummary.performanceOptimization?.recommendations?.total ?? 'unknown'}`,
                  `- Slow request rate: ${nightlySummary.performanceOptimization?.metrics?.slowRequestRate ?? 'unknown'}%`,
                  `- Cache hit rate: ${nightlySummary.performanceOptimization?.metrics?.cacheHitRate ?? 'unknown'}%`
                ].join('\n')
              : '## Nightly Summary\n- Summary file unavailable';
            const finalIssueBody = [body, '', nightlySummaryBlock, '', trendSummary].join('\n');
            if (existing) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                per_page: 5
              });
              const lastBody = comments[comments.length - 1]?.body || '';
              if (lastBody === finalIssueBody) {
                core.info('Nightly regression issue body unchanged; skipping duplicate comment.');
                return;
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: finalIssueBody
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: finalIssueBody
              });
            }
