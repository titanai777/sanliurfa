<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çevrimdışı - Şanlıurfa.com</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f0ee 0%, #e8ddd8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #a18072;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      font-weight: bold;
      color: white;
    }
    h1 {
      font-size: 24px;
      color: #45322b;
      margin-bottom: 12px;
    }
    p {
      color: #735448;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #a18072;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #8a6a5c;
    }
    .cached-content {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #d2bab0;
    }
    .cached-content h2 {
      font-size: 16px;
      color: #45322b;
      margin-bottom: 16px;
    }
    .cached-list {
      list-style: none;
    }
    .cached-list li {
      margin-bottom: 8px;
    }
    .cached-list a {
      color: #a18072;
      text-decoration: none;
      font-size: 14px;
    }
    .cached-list a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Ş</div>
    <div class="icon">📡</div>
    <h1>Çevrimdışı Mod</h1>
    <p>İnternet bağlantınızı kontrol edin. Daha önce ziyaret ettiğiniz bazı sayfaları görüntüleyebilirsiniz.</p>
    <a href="/" class="btn">
      <span>↻</span>
      Yeniden Dene
    </a>
    
    <div class="cached-content">
      <h2>Önbellekteki Sayfalar</h2>
      <ul class="cached-list">
        <li><a href="/">→ Ana Sayfa</a></li>
        <li><a href="/places">→ Mekanlar</a></li>
        <li><a href="/tarihi-yerler">→ Tarihi Yerler</a></li>
        <li><a href="/gastronomi">→ Gastronomi</a></li>
      </ul>
    </div>
  </div>
</body>
</html>
